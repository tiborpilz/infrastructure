apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: forgejo-db
  namespace: forgejo
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  storage:
    size: 10Gi
    storageClass: hcloud-volumes
  bootstrap:
    initdb:
      database: forgejo
      owner: forgejo
  monitoring:
    enablePodMonitor: false
