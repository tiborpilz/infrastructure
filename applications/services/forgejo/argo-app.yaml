apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: code.forgejo.org/forgejo-helm
    chart: forgejo
    targetRevision: 17.0.1
    helm:
      valuesObject:
        storageClass: hcloud-volumes
        database:
          storageSize: 10Gi
        test:
          enabled: false
        global:
          storageClass: hcloud-volumes
        namespaceOverride: forgejo
        persistence:
          enabled: true
          create: true
          mount: true
          claimName: forgejo-data
          size: 20Gi
          storageClass: hcloud-volumes
        ingress:
          enabled: false
        httpRoute:
          enabled: true
          parentRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: public
              namespace: gateway-system
              sectionName: https
          hostnames:
            - git.tibor.sh
          matches:
            path:
              type: PathPrefix
              value: /
            timeouts: {}
          port: 3000
          terminate: true
        tcpRoute:
          enabled: false
        service:
          http:
            type: ClusterIP
            port: 3000
          ssh:
            type: ClusterIP
        gitea:
          admin:
            existingSecret: forgejo-admin
            email: admin@tibor.sh
            passwordMode: keepUpdated
          oauth:
            - name: authentik
              provider: openidConnect
              existingSecret: forgejo-oidc
              autoDiscoverUrl: https://auth.tibor.sh/application/o/forgejo/.well-known/openid-configuration
              groupClaimName: groups
              adminGroup: forgejo-admins
          podAnnotations:
            checksum/forgejo-admin-secret: "argocd-managed"
            checksum/forgejo-oidc-secret: "argocd-managed"
          config:
            APP_NAME: Forgejo
            server:
              DOMAIN: git.tibor.sh
              ROOT_URL: https://git.tibor.sh/
              PROTOCOL: http
              HTTP_PORT: 3000
              SSH_DOMAIN: git.tibor.sh
              DISABLE_SSH: true
              START_SSH_SERVER: false
            database:
              DB_TYPE: postgres
              HOST: forgejo-db-rw:5432
              NAME: forgejo
              USER: forgejo
              SCHEMA: public
            oauth2_client:
              ENABLE_AUTO_REGISTRATION: true
              ACCOUNT_LINKING: auto
              USERNAME: preferred_username
              UPDATE_AVATAR: true
              OPENID_CONNECT_SCOPES: openid email profile
            openid:
              ENABLE_OPENID_SIGNIN: false
              ENABLE_OPENID_SIGNUP: false
            service:
              DISABLE_REGISTRATION: true
              ALLOW_ONLY_EXTERNAL_REGISTRATION: true
              SHOW_REGISTRATION_BUTTON: false
              ENABLE_INTERNAL_SIGNIN: false
              ENABLE_BASIC_AUTHENTICATION: true
            packages:
              ENABLED: false
          additionalConfigFromEnvs:
            - name: FORGEJO__DATABASE__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo-db-app
                  key: password
  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: forgejo
      namespace: forgejo
      jsonPointers:
        - /spec/rules/0/backendRefs/0/group
        - /spec/rules/0/backendRefs/0/weight
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
