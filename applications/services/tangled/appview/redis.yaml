---
# OAuth sessions live here; a redis restart just logs everyone out, so no
# persistence is configured.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appview-redis
  namespace: tangled
  labels:
    app.kubernetes.io/name: tangled-appview-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tangled-appview-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tangled-appview-redis
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: docker.io/library/redis:7-alpine
          imagePullPolicy: IfNotPresent
          args:
            - --maxmemory
            - 64mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: appview-redis
  namespace: tangled
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tangled-appview-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
