apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spindle-data
  namespace: tangled
  annotations:
    # holds the sqlite db + docker layers; prune deletes the backing volume
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hcloud-volumes
  resources:
    requests:
      storage: 20Gi
