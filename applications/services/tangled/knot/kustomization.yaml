apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Knot resources. namespace.yaml lives in the parent (applications/tangled) so
# the shared tangled namespace is owned once. argo-app.yaml (the child
# Application) points its source here, so it is not listed.

resources:
  - pvcs.yaml
  - deployment.yaml
  - services.yaml
  - httproute-knot.yaml

generators:
  - kustomization-ksops-generator.yaml
