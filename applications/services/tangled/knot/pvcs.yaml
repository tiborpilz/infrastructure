apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tangled-sshkeys
  namespace: tangled
  annotations:
    # Never prune: these hold live data and hcloud-volumes reclaims Delete, so an
    # accidental prune (e.g. while re-parenting between Argo apps) destroys the
    # backing volume. Resize/delete deliberately.
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hcloud-volumes
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tangled-repos
  namespace: tangled
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hcloud-volumes
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tangled-app
  namespace: tangled
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hcloud-volumes
  resources:
    requests:
      storage: 5Gi
