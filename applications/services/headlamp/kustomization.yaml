apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# argo-app.yaml omitted: it sources this path (self-referential). No namespace
# transformer: child Applications pin to argocd. Same convention as hubble.

resources:
  - namespace.yaml
  - argo-app-headlamp.yaml
  - argo-app-oauth2-proxy.yaml
  - httproute.yaml

generators:
  - kustomization-ksops-generator.yaml

# Reflect the secret into authentik (consumed as HEADLAMP_OIDC_CLIENT_SECRET).
# Name is headlamp-prefixed to avoid colliding with hubble's in authentik.
patches:
  - patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: headlamp-oauth2-proxy-secrets
        namespace: headlamp
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "authentik"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "authentik"
