apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Tier: services (sync-wave 3). User-facing workloads consuming the lower tiers
# (storage classes, cnpg operator, authentik OIDC). forgejo and woodpecker
# bundle their Application in their own kustomization; the rest are app-of-apps
# whose parent Application (argo-app.yaml) owns the destination namespace.
resources:
  - forgejo
  - woodpecker
  - tangled/argo-app.yaml
  - pds/argo-app.yaml
  - tekton/argo-app.yaml
  - headlamp/argo-app.yaml
  - hubble/argo-app.yaml
