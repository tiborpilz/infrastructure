apiVersion: apps/v1
kind: Deployment
metadata:
  name: radicle
  namespace: radicle
  labels:
    app.kubernetes.io/name: radicle
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: radicle
  template:
    metadata:
      labels:
        app.kubernetes.io/name: radicle
    spec:
      initContainers:
        - name: init-identity
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              mkdir -p "$RAD_HOME/keys" "$RAD_HOME/storage"
              if [ ! -f "$RAD_HOME/keys/radicle" ]; then
                apk add --no-cache openssh-keygen
                ssh-keygen -t ed25519 -N "" -C "radicle-tibor" -f "$RAD_HOME/keys/radicle"
              fi
              cp /config/config.json "$RAD_HOME/config.json"
              cat "$RAD_HOME/keys/radicle.pub"
          env:
            - name: RAD_HOME
              value: /radicle
          volumeMounts:
            - name: home
              mountPath: /radicle
            - name: node-config
              mountPath: /config
        - name: import-repo
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -u
              MARK="$RAD_HOME/.imported-infrastructure"
              if [ -f "$MARK" ]; then
                echo "infrastructure already imported"
                exit 0
              fi
              import() {
                set -eu
                apk add --no-cache curl git tar xz openssh-client
                curl -fsSL "https://files.radicle.xyz/releases/1.6.1/radicle-x86_64-unknown-linux-musl.tar.xz" -o /tmp/radicle.tar.xz
                mkdir -p /tmp/radicle
                tar -xJf /tmp/radicle.tar.xz -C /tmp/radicle
                export PATH="$(dirname "$(find /tmp/radicle -type f -name rad | head -n1)"):$PATH"
                eval "$(ssh-agent -s)"
                ssh-add "$RAD_HOME/keys/radicle" || true
                git clone https://github.com/tiborpilz/infrastructure.git /tmp/infrastructure
                cd /tmp/infrastructure
                rad init --name infrastructure \
                  --description "Mirror of tiborpilz/infrastructure" \
                  --default-branch main --public --no-confirm
                git push rad
              }
              if import; then
                touch "$MARK"
                echo "imported infrastructure"
              else
                echo "WARNING: infrastructure import failed; starting node without it" >&2
              fi
              exit 0
          env:
            - name: RAD_HOME
              value: /radicle
          volumeMounts:
            - name: home
              mountPath: /radicle
        - name: build-httpd
          image: rust:1-bookworm
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -eu
              REF=8e2148599ebd115db126eb60d8fd99be8904c978
              BIN="$RAD_HOME/bin/radicle-httpd"
              MARK="$RAD_HOME/bin/.httpd-ref"
              if [ -x "$BIN" ] && [ "$(cat "$MARK" 2>/dev/null || true)" = "$REF" ]; then
                echo "radicle-httpd already built at $REF"
                exit 0
              fi
              git clone https://github.com/radicle-dev/radicle-explorer.git /workspace
              cd /workspace
              git checkout "$REF"
              cargo build --release --manifest-path radicle-httpd/Cargo.toml
              mkdir -p "$RAD_HOME/bin"
              cp "$(find . -type f -path '*/release/radicle-httpd' | head -n1)" "$BIN"
              chmod +x "$BIN"
              echo "$REF" > "$MARK"
          env:
            - name: RAD_HOME
              value: /radicle
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              memory: 6Gi
          volumeMounts:
            - name: home
              mountPath: /radicle
            - name: workspace
              mountPath: /workspace
      containers:
        - name: node
          image: fredix/radicle-node:1.6.1
          imagePullPolicy: IfNotPresent
          env:
            - name: RAD_HOME
              value: /radicle
            - name: RUST_LOG
              value: info
          ports:
            - name: p2p
              containerPort: 8776
          volumeMounts:
            - name: home
              mountPath: /radicle
          readinessProbe:
            tcpSocket:
              port: 8776
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8776
            initialDelaySeconds: 45
            periodSeconds: 30
        - name: httpd
          image: rust:1-bookworm
          command: ["/radicle/bin/radicle-httpd", "--listen", "0.0.0.0:8080"]
          env:
            - name: RAD_HOME
              value: /radicle
            - name: RUST_LOG
              value: info
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 30
          volumeMounts:
            - name: home
              mountPath: /radicle
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: radicle-home
        - name: node-config
          configMap:
            name: radicle-node-config
        - name: workspace
          emptyDir: {}
