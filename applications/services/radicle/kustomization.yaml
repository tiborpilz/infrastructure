apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - pvc.yaml
  - node-config.yaml
  - deployment.yaml
  - service.yaml
  - explorer-config.yaml
  - explorer.yaml
  - httproute.yaml

images:
  - name: alpine
    newTag: "3.20"
  - name: fredix/radicle-node
    newTag: "1.6.1"
  - name: fredix/radicle-httpd
    newTag: "0.23.0"
  - name: khuedoan/radicle-explorer
    newTag: "latest"
