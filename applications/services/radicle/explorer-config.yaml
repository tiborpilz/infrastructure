apiVersion: v1
kind: ConfigMap
metadata:
  name: radicle-explorer-config
  namespace: radicle
data:
  # Runtime config for the Radicle Explorer SPA (served at /config.json in the
  # web root). Mirrors the shape of the upstream config/default.json, with the
  # preferred seed pointed at our own httpd. The Explorer runs in the visitor's
  # browser and calls the httpd at ${scheme}://${hostname}:${port}/api/v1, i.e.
  # https://radicle.tibor.sh/api/v1 -> routed to radicle-httpd.
  #
  # requiredApiVersion gates which httpd versions the Explorer will talk to. If
  # the UI reports a version mismatch, check what https://radicle.tibor.sh/api/v1
  # returns as "apiVersion" and widen this range to match.
  config.json: |
    {
      "nodes": {
        "fallbackPublicExplorer": "https://app.radicle.xyz/nodes/$host/$rid$path",
        "requiredApiVersion": ">=0.18.0",
        "defaultHttpdPort": 443,
        "defaultLocalHttpdPort": 8080,
        "defaultHttpdScheme": "https"
      },
      "source": {
        "commitsPerPage": 30
      },
      "supportWebsite": "https://radicle.zulipchat.com",
      "deploymentId": null,
      "preferredSeeds": [
        {
          "hostname": "radicle.tibor.sh",
          "port": 443,
          "scheme": "https"
        }
      ]
    }
