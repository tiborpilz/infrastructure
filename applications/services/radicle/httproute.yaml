apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: radicle
  namespace: radicle
spec:
  parentRefs:
    - name: public
      namespace: gateway-system
      sectionName: https
  hostnames:
    - radicle.tibor.sh
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: radicle-httpd
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: radicle-explorer
          port: 80
