apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: coder-db
  namespace: coder
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  storage:
    size: 8Gi
    storageClass: ceph-block
  bootstrap:
    initdb:
      database: coder
      owner: coder
  monitoring:
    enablePodMonitor: false
