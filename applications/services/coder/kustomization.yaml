apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: blueprints/oidc.yaml is intentionally not listed here. Like every other
# service, Authentik blueprints are collected separately by
# applications/_generators/blueprints-aggregator.sh. The templates/ directory
# (Terraform + Nix for the workspace image) is likewise not a Kubernetes
# resource and is pushed to Coder out-of-band (see templates/nix-devbox/README.md).
resources:
  - namespace.yaml
  - secrets.enc.yaml
  - httproute.yaml
  - database.yaml
  - argo-app.yaml
