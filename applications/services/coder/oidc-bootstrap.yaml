# Provisions the shared OIDC client secret used by both Coder and Authentik.
#
# Authentik reads it (as CODER_OIDC_CLIENT_SECRET, via the reflected copy in the
# authentik namespace) to set the provider's client_secret in blueprints/oidc.yaml,
# and Coder reads it from the coder-oidc secret in this namespace. Mirrors the
# runtime-bootstrap pattern already used by woodpecker/oauth-bootstrap.yaml, so no
# new sops-encrypted secret is required. Idempotent: it is a no-op once populated.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: coder-oidc-bootstrap
  namespace: coder
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coder-oidc-bootstrap
  namespace: coder
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["coder-oidc"]
    verbs: ["get", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coder-oidc-bootstrap
  namespace: coder
subjects:
  - kind: ServiceAccount
    name: coder-oidc-bootstrap
    namespace: coder
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: coder-oidc-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: coder-oidc-bootstrap
  namespace: coder
spec:
  backoffLimit: 20
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: coder-oidc-bootstrap
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: alpine/k8s:1.30.4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: HOME
              value: /tmp
            - name: NS
              value: coder
            - name: SECRET_NAME
              value: coder-oidc
          command: ["/bin/sh", "-eu", "-c"]
          args:
            - |
              existing=$(kubectl -n "$NS" get secret "$SECRET_NAME" -o json 2>/dev/null || true)
              if [ -n "$existing" ]; then
                val=$(printf '%s' "$existing" | jq -r '.data["client-secret"] // empty' | (base64 -d 2>/dev/null || true))
                if [ -n "$val" ]; then
                  echo "$SECRET_NAME already populated; nothing to do."
                  exit 0
                fi
              fi

              CLIENT_SECRET=$(openssl rand -hex 32)

              # reflector copies the secret into the authentik namespace so the
              # authentik server can expose it as CODER_OIDC_CLIENT_SECRET.
              cat <<EOF | kubectl apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: $SECRET_NAME
                namespace: $NS
                annotations:
                  reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
                  reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "authentik"
                  reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
                  reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "authentik"
              type: Opaque
              stringData:
                client-secret: "$CLIENT_SECRET"
              EOF

              echo "coder-oidc bootstrap complete."
