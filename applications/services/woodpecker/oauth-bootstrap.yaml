apiVersion: v1
kind: ServiceAccount
metadata:
  name: woodpecker-oauth-bootstrap
  namespace: woodpecker
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: woodpecker-oauth-bootstrap-forgejo-reader
  namespace: forgejo
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["forgejo-admin"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: woodpecker-oauth-bootstrap-forgejo-reader
  namespace: forgejo
subjects:
  - kind: ServiceAccount
    name: woodpecker-oauth-bootstrap
    namespace: woodpecker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: woodpecker-oauth-bootstrap-forgejo-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: woodpecker-oauth-bootstrap
  namespace: woodpecker
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["woodpecker-oauth"]
    verbs: ["get", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: woodpecker-oauth-bootstrap
  namespace: woodpecker
subjects:
  - kind: ServiceAccount
    name: woodpecker-oauth-bootstrap
    namespace: woodpecker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: woodpecker-oauth-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: woodpecker-oauth-bootstrap
  namespace: woodpecker
spec:
  backoffLimit: 20
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: woodpecker-oauth-bootstrap
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: alpine/k8s:1.30.4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: HOME
              value: /tmp
            - name: FORGEJO_URL
              value: https://git.tibor.sh
            - name: REDIRECT_URI
              value: https://ci.tibor.sh/authorize
            - name: APP_NAME
              value: woodpecker
            - name: SECRET_NAME
              value: woodpecker-oauth
            - name: NS
              value: woodpecker
            - name: FORGEJO_NS
              value: forgejo
          command: ["/bin/sh", "-eu", "-c"]
          args:
            - |
              existing=$(kubectl -n "$NS" get secret "$SECRET_NAME" -o json 2>/dev/null || true)
              if [ -n "$existing" ]; then
                client=$(printf '%s' "$existing" | jq -r '.data.WOODPECKER_FORGEJO_CLIENT // empty' | (base64 -d 2>/dev/null || true))
                secret=$(printf '%s' "$existing" | jq -r '.data.WOODPECKER_FORGEJO_SECRET // empty' | (base64 -d 2>/dev/null || true))
                if [ -n "$client" ] && [ -n "$secret" ]; then
                  echo "$SECRET_NAME already populated; nothing to do."
                  exit 0
                fi
              fi

              FORGEJO_ADMIN_USERNAME=$(kubectl -n "$FORGEJO_NS" get secret forgejo-admin -o jsonpath='{.data.username}' | base64 -d)
              FORGEJO_ADMIN_PASSWORD=$(kubectl -n "$FORGEJO_NS" get secret forgejo-admin -o jsonpath='{.data.password}' | base64 -d)

              AUTH="$FORGEJO_ADMIN_USERNAME:$FORGEJO_ADMIN_PASSWORD"
              API="$FORGEJO_URL/api/v1/user/applications/oauth2"

              fetch() {
                METHOD="$1"; URL="$2"; BODY="${3:-}"
                if [ -n "$BODY" ]; then
                  curl -s -u "$AUTH" -X "$METHOD" -H 'Content-Type: application/json' -w '\n%{http_code}' -d "$BODY" "$URL"
                else
                  curl -s -u "$AUTH" -X "$METHOD" -w '\n%{http_code}' "$URL"
                fi
              }

              RAW=$(fetch GET "$API")
              HTTP=$(printf '%s' "$RAW" | tail -n1)
              APPS=$(printf '%s' "$RAW" | sed '$d')
              if [ "$HTTP" != "200" ]; then
                echo "Failed to list OAuth apps (HTTP $HTTP): $APPS" >&2
                exit 1
              fi

              APP_ID=$(printf '%s' "$APPS" | jq -r --arg name "$APP_NAME" '.[] | select(.name == $name) | .id' | head -n1)

              if [ -n "$APP_ID" ] && [ "$APP_ID" != "null" ]; then
                echo "OAuth app '$APP_NAME' exists (id=$APP_ID); deleting so we can recreate with a known secret"
                DEL_RAW=$(fetch DELETE "$API/$APP_ID")
                DEL_HTTP=$(printf '%s' "$DEL_RAW" | tail -n1)
                if [ "$DEL_HTTP" != "204" ] && [ "$DEL_HTTP" != "404" ]; then
                  echo "Failed to delete existing OAuth app (HTTP $DEL_HTTP)" >&2
                  exit 1
                fi
              fi

              echo "Creating OAuth app '$APP_NAME' in Forgejo"
              BODY=$(jq -nc --arg n "$APP_NAME" --arg r "$REDIRECT_URI" '{name:$n, redirect_uris:[$r], confidential_client:true}')
              RAW=$(fetch POST "$API" "$BODY")
              HTTP=$(printf '%s' "$RAW" | tail -n1)
              RESP=$(printf '%s' "$RAW" | sed '$d')
              if [ "$HTTP" != "201" ] && [ "$HTTP" != "200" ]; then
                echo "Failed to create OAuth app (HTTP $HTTP): $RESP" >&2
                exit 1
              fi

              CLIENT_ID=$(printf '%s' "$RESP" | jq -r '.client_id // empty')
              CLIENT_SECRET=$(printf '%s' "$RESP" | jq -r '.client_secret // empty')

              if [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ]; then
                echo "Forgejo response missing client_id/secret: $RESP" >&2
                exit 1
              fi

              kubectl -n "$NS" create secret generic "$SECRET_NAME" \
                --from-literal=WOODPECKER_FORGEJO_CLIENT="$CLIENT_ID" \
                --from-literal=WOODPECKER_FORGEJO_SECRET="$CLIENT_SECRET" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "OAuth bootstrap complete."
