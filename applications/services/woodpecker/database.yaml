apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: woodpecker-db
  namespace: woodpecker
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  storage:
    size: 8Gi
    storageClass: ceph-block
  bootstrap:
    initdb:
      database: woodpecker
      owner: woodpecker
  monitoring:
    enablePodMonitor: false
