apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: harbor-valkey
  namespace: harbor
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/instance: harbor
spec:
  replicas: 1
  serviceName: harbor-valkey
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
      app.kubernetes.io/instance: harbor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
        app.kubernetes.io/instance: harbor
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: valkey/valkey
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          args:
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - name: valkey
              containerPort: 6379
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli PING
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: valkey
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: harbor-valkey
  namespace: harbor
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/instance: harbor
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/instance: harbor
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
