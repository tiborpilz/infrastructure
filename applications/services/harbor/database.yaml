apiVersion: postgresql.cnpg.io/v1
kind: Cluster
# Named harbor-pg (not harbor-db): the original cluster was created on
# hcloud-volumes and CNPG storage is immutable, so the rename lets argocd
# prune the stuck cluster and create this one fresh.
metadata:
  name: harbor-pg
  namespace: harbor
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  storage:
    size: 10Gi
    storageClass: ceph-block
  bootstrap:
    initdb:
      database: registry
      owner: harbor
  monitoring:
    enablePodMonitor: false
