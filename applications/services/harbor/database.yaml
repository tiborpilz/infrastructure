apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: harbor-db
  namespace: harbor
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  storage:
    size: 10Gi
    storageClass: ceph-block
  bootstrap:
    initdb:
      database: registry
      owner: harbor
  monitoring:
    enablePodMonitor: false
