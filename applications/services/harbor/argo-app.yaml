apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.19.1
    helm:
      releaseName: harbor
      valuesObject:
        externalURL: https://harbor.tibor.sh

        expose:
          type: clusterIP
          tls:
            enabled: false
          clusterIP:
            name: harbor
            ports:
              httpPort: 80

        ipFamily:
          ipv6:
            enabled: false

        # RWO volumes deadlock on RollingUpdate (multi-attach).
        updateStrategy:
          type: Recreate

        # Claims live in pvcs.yaml under fresh names: the chart's original
        # PVCs were created on hcloud-volumes and PVC specs are immutable,
        # so retargeting storage means new claims and pruning the old ones.
        persistence:
          enabled: true
          resourcePolicy: keep
          persistentVolumeClaim:
            registry:
              existingClaim: harbor-registry-data
            jobservice:
              jobLog:
                existingClaim: harbor-joblog

        # All component secrets pinned via existingSecret so ArgoCD renders
        # are deterministic; the chart would otherwise regenerate them on
        # every sync.
        existingSecretAdminPassword: harbor-admin
        existingSecretSecretKey: harbor-encryption

        core:
          existingSecret: harbor-core
          existingXsrfSecret: harbor-core

        jobservice:
          existingSecret: harbor-jobservice

        registry:
          existingSecret: harbor-registry
          credentials:
            existingSecret: harbor-registry

        database:
          type: external
          external:
            host: harbor-pg-rw
            port: "5432"
            username: harbor
            coreDatabase: registry
            existingSecret: harbor-pg-app

        # Ephemeral valkey (valkey.yaml) instead of the chart's PVC-backed
        # redis; harbor only caches sessions and job queues here.
        redis:
          type: external
          external:
            addr: harbor-valkey:6379

        trivy:
          enabled: false

        metrics:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
