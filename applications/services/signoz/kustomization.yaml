apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - argo-app-signoz.yaml
  - argo-app-oauth2-proxy.yaml
  - httproute.yaml

generators:
  - kustomization-ksops-generator.yaml

patches:
  # oauth2-proxy and Authentik must share the same client secret. The secret
  # is authored here and reflected into the authentik namespace, where
  # authentik's Deployment reads it as SIGNOZ_OIDC_CLIENT_SECRET for the
  # blueprint's !Env lookup.
  - patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: signoz-oauth2-proxy-secrets
        namespace: signoz
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "authentik"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "authentik"
