apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 61.9.0
    helm:
      releaseName: kube-prometheus-stack
      valuesObject:
        crds:
          enabled: true

        prometheus:
          prometheusSpec:
            retention: 15d
            retentionSize: "18GB"
            enableRemoteWriteReceiver: true
            enableFeatures:
              - otlp-write-receiver
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 1536Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: ceph-block
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi

        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 128Mi

        grafana:
          enabled: true
          envFromSecret: grafana-secrets
          persistence:
            enabled: true
            storageClassName: ceph-block
            size: 5Gi
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          grafana.ini:
            server:
              root_url: https://grafana.tibor.sh
            auth:
              oauth_auto_login: false
            "auth.generic_oauth":
              enabled: true
              name: Authentik
              scopes: "openid profile email groups"
              auth_url: https://auth.tibor.sh/application/o/authorize/
              token_url: https://auth.tibor.sh/application/o/token/
              api_url: https://auth.tibor.sh/application/o/userinfo/
              use_pkce: true
              role_attribute_path: "contains(groups[*], 'grafana-admins') && 'Admin' || contains(groups[*], 'grafana-editors') && 'Editor' || 'Viewer'"
              allow_assign_grafana_admin: true
          additionalDataSources:
            - name: Loki
              type: loki
              uid: loki
              access: proxy
              url: http://loki-gateway.observability.svc.cluster.local
              jsonData:
                derivedFields:
                  - name: TraceID
                    matcherRegex: '(?:trace_id|traceID|trace\.id)"?[:=]"?(\w+)'
                    url: "$${__value.raw}"
                    datasourceUid: jaeger
            - name: Jaeger
              type: jaeger
              uid: jaeger
              access: proxy
              url: http://jaeger-query.observability.svc.cluster.local:16686
              jsonData:
                tracesToLogsV2:
                  datasourceUid: loki
                tracesToMetrics:
                  datasourceUid: prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
