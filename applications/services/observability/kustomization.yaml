apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - argo-app-kube-prometheus-stack.yaml
  - argo-app-loki.yaml
  - argo-app-alloy.yaml
  - alloy-rbac.yaml
  - argo-app-jaeger.yaml
  - argo-app-jaeger-oauth2-proxy.yaml
  - argo-app-otel-collector.yaml
  - httproute-grafana.yaml
  - httproute-jaeger.yaml

generators:
  - kustomization-ksops-generator.yaml

# Reflector copies the OIDC secrets into the authentik namespace, where the
# authentik worker reads the client secrets (as !Env in the blueprints) to
# register matching OAuth2 providers.
patches:
  - patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: grafana-secrets
        namespace: observability
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "authentik"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "authentik"
  - patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: jaeger-oauth2-proxy-secrets
        namespace: observability
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "authentik"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "authentik"
