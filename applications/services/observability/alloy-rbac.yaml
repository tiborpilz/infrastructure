# Alloy's log source reads pod logs through the Kubernetes API, which the
# chart's default ClusterRole does not permit (it grants pods but not
# pods/log). This supplements it. Bound to the `alloy` ServiceAccount the
# Alloy chart creates in the observability namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-pods-log
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: observability
rules:
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-pods-log
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy-pods-log
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: observability
