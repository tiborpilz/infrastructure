apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.165.0
    helm:
      releaseName: otel-collector
      valuesObject:
        image:
          repository: otel/opentelemetry-collector-contrib
        mode: deployment
        replicaCount: 1
        presets:
          kubernetesAttributes:
            enabled: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi
        ports:
          otlp:
            enabled: true
          otlp-http:
            enabled: true
          jaeger-compact:
            enabled: false
          jaeger-thrift:
            enabled: false
          jaeger-grpc:
            enabled: false
          zipkin:
            enabled: false
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          processors:
            memory_limiter:
              check_interval: 5s
              limit_percentage: 80
              spike_limit_percentage: 25
            batch: {}
          exporters:
            otlp/jaeger:
              endpoint: jaeger-collector.observability.svc.cluster.local:4317
              tls:
                insecure: true
            prometheusremotewrite:
              endpoint: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write
              resource_to_telemetry_conversion:
                enabled: true
            otlphttp/loki:
              endpoint: http://loki-gateway.observability.svc.cluster.local/otlp
            # Fan the same OTLP stream into SigNoz (parallel stack, for
            # feature comparison). SigNoz's collector takes all three signals
            # over OTLP gRPC on 4317.
            otlp/signoz:
              endpoint: signoz-otel-collector.observability.svc.cluster.local:4317
              tls:
                insecure: true
          service:
            pipelines:
              traces:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [otlp/jaeger, otlp/signoz]
              metrics:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [prometheusremotewrite, otlp/signoz]
              logs:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [otlphttp/loki, otlp/signoz]
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
