apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: observability
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: gateway-system
      sectionName: https
  hostnames:
    - grafana.tibor.sh
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        # Grafana handles SSO itself (Authentik generic_oauth), so it faces
        # the gateway directly — no oauth2-proxy in front.
        - name: kube-prometheus-stack-grafana
          port: 80
