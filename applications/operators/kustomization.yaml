apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Tier: operators (sync-wave 0). Cluster-wide controllers everything else
# depends on. Each entry is an app directory whose own kustomization bundles its
# Application plus supporting objects. No namespace transformer: each app pins
# its own namespaces.
resources:
  - sops-secrets-operator
  - reflector
  - cnpg-operator
  - metrics-server
  - cluster-autoscaler
