apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: tracing
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        pod:
          # hcloud LB targets are hcloud servers only; with externalTrafficPolicy
          # Local an envoy pod on the proxmox tier leaves the LB with no healthy
          # targets.
          nodeSelector:
            instance.hetzner.cloud/provided-by: cloud
      envoyService:
        annotations:
          load-balancer.hetzner.cloud/location: fsn1
          load-balancer.hetzner.cloud/disable-private-ingress: "true"
  telemetry:
    tracing:
      samplingRate: 100
      provider:
        type: OpenTelemetry
        backendRefs:
          - name: otel-collector-opentelemetry-collector
            namespace: observability
            port: 4317
