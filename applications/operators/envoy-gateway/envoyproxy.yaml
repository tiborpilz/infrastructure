apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: tracing
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        pod:
          # The generated LB service is externalTrafficPolicy=Local, so envoy
          # pods must run on nodes the hcloud LB can target: hcloud servers
          # (proxmox tier is invisible to the CCM) excluding control planes
          # (exclude-from-external-load-balancers).
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: instance.hetzner.cloud/provided-by
                        operator: In
                        values:
                          - cloud
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist
      envoyService:
        annotations:
          load-balancer.hetzner.cloud/location: fsn1
          load-balancer.hetzner.cloud/disable-private-ingress: "true"
  telemetry:
    tracing:
      samplingRate: 100
      provider:
        type: OpenTelemetry
        backendRefs:
          - name: otel-collector-opentelemetry-collector
            namespace: observability
            port: 4317
