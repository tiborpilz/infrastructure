# Provisions an S3 bucket on the Ceph object store (RGW). Rook writes a
# ConfigMap + Secret named "etcd-backup" (bucket name + access keys) that the
# CronJob consumes. Ceph OSDs sit on the Proxmox tier — a different failure
# domain from the Hetzner control plane.
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: etcd-backup
  namespace: etcd-backup
spec:
  generateBucketName: etcd-backup
  storageClassName: ceph-bucket
