apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook
  namespace: argocd
spec:
  project: platform
  # App-of-apps: this parent renders applications/rook (namespace + the
  # rook-ceph-operator and rook-ceph-cluster child Applications). Apply this file
  # once to bootstrap; everything below it then flows from git. Matches the
  # git-path convention used by applications/tekton and applications/hubble.
  source:
    path: applications/rook
    repoURL: https://github.com/tiborpilz/infrastructure
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
