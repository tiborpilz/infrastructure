apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-ceph-cluster
  namespace: argocd
  annotations:
    # After the operator so the CephCluster/pool CRDs exist.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: https://charts.rook.io/release
    chart: rook-ceph-cluster
    targetRevision: v1.20.1
    helm:
      releaseName: rook-ceph
      valuesObject:
        operatorNamespace: rook-ceph
        toolbox:
          enabled: true
        monitoring:
          enabled: false
        cephClusterSpec:
          mon:
            count: 3
            allowMultiplePerNode: false
          mgr:
            count: 2
            allowMultiplePerNode: false
          dashboard:
            enabled: true
            ssl: false
          # Pin every Ceph daemon (mon/mgr/osd) to the three storage nodes by
          # their built-in hostname label. No new node label is added, so no
          # Talos machine-config change and no cluster re-deploy.
          placement:
            all:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - worker-2
                            - worker-3
                            - worker-4
          # cx23 storage nodes are 2 vCPU / ~3.3Gi. Chart defaults (osd 4Gi)
          # don't fit; trimmed so daemons schedule. Rook derives osd_memory_target
          # from the osd memory limit, so the limit also caps real usage.
          resources:
            mon:
              limits:
                memory: "512Mi"
              requests:
                cpu: "100m"
                memory: "256Mi"
            mgr:
              limits:
                memory: "768Mi"
              requests:
                cpu: "100m"
                memory: "256Mi"
            osd:
              limits:
                memory: "2Gi"
              requests:
                cpu: "250m"
                memory: "1Gi"
          storage:
            useAllNodes: false
            useAllDevices: false
            # Each node's 50Gi raw hcloud volume is the unformatted /dev/sdb
            # (boot disk is /dev/sda, automount=false on the data volume).
            nodes:
              - name: "worker-2"
                devices:
                  - name: "/dev/sdb"
              - name: "worker-3"
                devices:
                  - name: "/dev/sdb"
              - name: "worker-4"
                devices:
                  - name: "/dev/sdb"
        # Block (RBD) — opt-in StorageClass, hcloud-volumes stays the default.
        cephBlockPools:
          - name: ceph-blockpool
            spec:
              failureDomain: host
              replicated:
                size: 3
            storageClass:
              enabled: true
              name: ceph-block
              isDefault: false
              reclaimPolicy: Delete
              allowVolumeExpansion: true
              volumeBindingMode: "Immediate"
              parameters:
                imageFormat: "2"
                imageFeatures: layering
                csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
                csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
                csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
                csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
                csi.storage.k8s.io/controller-publish-secret-name: rook-csi-rbd-provisioner
                csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
                csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
                csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
                csi.storage.k8s.io/fstype: ext4
        # Shared filesystem (CephFS) — opt-in RWX StorageClass.
        cephFileSystems:
          - name: ceph-filesystem
            spec:
              metadataPool:
                replicated:
                  size: 3
              dataPools:
                - failureDomain: host
                  replicated:
                    size: 3
                  name: data0
              metadataServer:
                activeCount: 1
                activeStandby: true
                resources:
                  limits:
                    memory: "1Gi"
                  requests:
                    cpu: "100m"
                    memory: "512Mi"
                priorityClassName: system-cluster-critical
            storageClass:
              enabled: true
              isDefault: false
              name: ceph-filesystem
              pool: data0
              reclaimPolicy: Delete
              allowVolumeExpansion: true
              volumeBindingMode: "Immediate"
              parameters:
                csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
                csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
                csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
                csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
                csi.storage.k8s.io/controller-publish-secret-name: rook-csi-cephfs-provisioner
                csi.storage.k8s.io/controller-publish-secret-namespace: "{{ .Release.Namespace }}"
                csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
                csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
                csi.storage.k8s.io/fstype: ext4
        # Object store (S3 / RGW) — opt-in bucket StorageClass.
        cephObjectStores:
          - name: ceph-objectstore
            spec:
              metadataPool:
                failureDomain: host
                replicated:
                  size: 3
              # Replicated (not erasure-coded) data pool: with only 3 hosts an
              # EC 2+1 pool leaves no spare host to recover on a node failure.
              dataPool:
                failureDomain: host
                replicated:
                  size: 3
              preservePoolsOnDelete: false
              gateway:
                port: 80
                instances: 1
                resources:
                  limits:
                    memory: "512Mi"
                  requests:
                    cpu: "100m"
                    memory: "256Mi"
                priorityClassName: system-cluster-critical
            storageClass:
              enabled: true
              name: ceph-bucket
              reclaimPolicy: Delete
              volumeBindingMode: "Immediate"
              parameters:
                region: us-east-1
  destination:
    server: https://kubernetes.default.svc
    namespace: rook-ceph
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # The CephCluster/CephBlockPool/etc. CRs here depend on CRDs installed by
    # the operator Application. SkipDryRunOnMissingResource + retry let this app
    # converge once those CRDs exist (the two are independent Applications, so
    # sync waves can't order them).
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
