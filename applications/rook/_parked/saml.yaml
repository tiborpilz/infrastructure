# Authentik blueprint registering the Ceph dashboard as a SAML 2.0 Service
# Provider. Picked up by the authentik blueprint aggregator (applications/authentik
# globs */blueprints/*.yaml), not by rook's own kustomization.
#
# The dashboard does native SAML SSO (no oauth2-proxy). Authentik is the IdP;
# Ceph consumes the IdP metadata at
# https://auth.tibor.sh/application/saml/ceph/metadata/.
#
# URLs are hardcoded to ceph.tibor.sh / auth.tibor.sh (the aggregator copies
# blueprint files verbatim, so kustomize vars never reach them).
version: 1
metadata:
  name: ceph-saml
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_providers_saml.samlprovider
    state: present
    identifiers:
      name: ceph
    attrs:
      # Where authentik POSTs the SAML response (the dashboard's ACS endpoint).
      acs_url: https://ceph.tibor.sh/auth/saml2
      # Must match the SP's expected audience / entityID.
      audience: https://ceph.tibor.sh/auth/saml2/metadata
      sp_binding: post
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_kp: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      # Required when a signing_kp is set; Ceph (onelogin) wants signed assertions.
      sign_assertion: true
      # NameID = the user's email; Ceph maps this to a pre-created dashboard user.
      name_id_mapping: !Find [authentik_providers_saml.samlpropertymapping, [name, "authentik default SAML Mapping: Email"]]
      property_mappings:
        - !Find [authentik_providers_saml.samlpropertymapping, [name, "authentik default SAML Mapping: UPN"]]
        - !Find [authentik_providers_saml.samlpropertymapping, [name, "authentik default SAML Mapping: Name"]]
        - !Find [authentik_providers_saml.samlpropertymapping, [name, "authentik default SAML Mapping: Email"]]
        - !Find [authentik_providers_saml.samlpropertymapping, [name, "authentik default SAML Mapping: Username"]]
        - !Find [authentik_providers_saml.samlpropertymapping, [name, "authentik default SAML Mapping: Groups"]]
  - model: authentik_core.application
    state: present
    identifiers:
      slug: ceph
    attrs:
      name: Ceph
      provider: !Find [authentik_providers_saml.samlprovider, [name, ceph]]
      meta_launch_url: https://ceph.tibor.sh
