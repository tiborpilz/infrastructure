apiVersion: v1
kind: Namespace
metadata:
  name: rook-ceph
  labels:
    managed-by: argo
  # Rook's operator, OSD prepare jobs, mon/osd/mgr pods run privileged
  # (raw block device access, hostPath /var/lib/rook). Scope is tight; only
  # Rook-Ceph lives here.
  annotations:
    # Create the namespace before the child Applications that target it.
    argocd.argoproj.io/sync-wave: "-1"
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
