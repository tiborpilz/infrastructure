apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Root app-of-apps content, rendered by the `root` Application
# (applications/root.yaml). Emits the four tier Applications; their sync-waves
# (0..3) order the tiers, and each tier in turn renders its leaf apps. argocd
# itself stays self-managed outside this tree. No namespace transformer: the
# tier Application CRs pin themselves to argocd.
resources:
  - operators/application.yaml
  - storage/application.yaml
  - identity/application.yaml
  - services/application.yaml
