apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generators:
  - blueprints-generator.yaml

configMapGenerator:
  - name: authentik-users-blueprint
    files:
      - blueprints/users.yaml

resources:
  - argo-app.yaml
  - users.enc.yaml
  - secrets.enc.yaml
  - oidc-clients.enc.yaml

# Rewrites the valkey sidecar StatefulSet embedded in the Application's helm
# valuesObject (kustomize's images transformer matches any containers[] list).
images:
  - name: valkey/valkey
    newTag: "9-alpine"
