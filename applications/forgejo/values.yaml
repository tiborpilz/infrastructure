storageClass: hcloud-volumes

database:
  storageSize: 10Gi

test:
  enabled: false

global:
  storageClass: hcloud-volumes

namespaceOverride: forgejo

persistence:
  enabled: true
  create: true
  mount: true
  claimName: forgejo-data
  size: 20Gi
  storageClass: hcloud-volumes

ingress:
  enabled: false

httpRoute:
  enabled: true
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public
      namespace: gateway-system
      sectionName: https
  hostnames:
    - git.$(DOMAIN)
  matches:
    path:
      type: PathPrefix
      value: /
    timeouts: {}
  port: 3000
  terminate: true

tcpRoute:
  enabled: false

service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    type: ClusterIP

gitea:
  oauth:
    - name: authentik
      provider: openidConnect
      existingSecret: forgejo-oidc
      autoDiscoverUrl: https://auth.$(DOMAIN)/application/o/forgejo/.well-known/openid-configuration
      groupClaimName: groups
      adminGroup: forgejo-admins

  podAnnotations:
    checksum/forgejo-oidc-secret: "argocd-managed"

  config:
    APP_NAME: Forgejo
    server:
      DOMAIN: git.$(DOMAIN)
      ROOT_URL: https://git.$(DOMAIN)/
      PROTOCOL: http
      HTTP_PORT: 3000
      SSH_DOMAIN: git.$(DOMAIN)
      DISABLE_SSH: true
      START_SSH_SERVER: false
    database:
      DB_TYPE: postgres
      HOST: forgejo-db-rw:5432
      NAME: forgejo
      USER: forgejo
      SCHEMA: public
    oauth2_client:
      ENABLE_AUTO_REGISTRATION: true
      ACCOUNT_LINKING: auto
      USERNAME: preferred_username
      UPDATE_AVATAR: true
      OPENID_CONNECT_SCOPES: openid email profile
    openid:
      ENABLE_OPENID_SIGNIN: false
      ENABLE_OPENID_SIGNUP: false
    service:
      DISABLE_REGISTRATION: true
      ALLOW_ONLY_EXTERNAL_REGISTRATION: true
      SHOW_REGISTRATION_BUTTON: false
      ENABLE_INTERNAL_SIGNIN: false
      ENABLE_BASIC_AUTHENTICATION: true
    packages:
      ENABLED: false

  additionalConfigFromEnvs:
    - name: FORGEJO__DATABASE__PASSWD
      valueFrom:
        secretKeyRef:
          name: forgejo-db-app
          key: password
