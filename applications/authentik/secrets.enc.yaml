apiVersion: isindir.github.com/v1alpha3
kind: SopsSecret
metadata:
  name: authentik-env-secrets
  namespace: authentik
spec:
  secretTemplates:
    # Single source of truth for OIDC client secrets. Authentik's worker
    # `envFrom`s this directly; reflector replicates it into the argocd
    # and forgejo namespaces so each app reads the same value natively.
    - name: authentik-env-secrets
      annotations:
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "argocd,forgejo"
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "argocd,forgejo"
      stringData:
        FORGEJO_OIDC_CLIENT_SECRET: SHv4/nMUYcRlazA698GLFSEwP8Yx3Y5VKCxy2fPlAEXIINecJQPG0ixb2OQTUAU2
        ARGOCD_OIDC_CLIENT_SECRET: CHANGE_ME_BEFORE_ENCRYPTING
