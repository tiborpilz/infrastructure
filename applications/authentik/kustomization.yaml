apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Per-service authentik blueprints live in
# applications/<service>/blueprints/*.yaml. The aggregator script walks the
# tree and emits a single ConfigMap that authentik's worker mounts at
# /blueprints/custom.
generators:
  - blueprints-generator.yaml

configMapGenerator:
  - name: authentik-users-blueprint
    files:
      - blueprints/users.yaml

resources:
  - argo-app.yaml
  - users.enc.yaml
  - secrets.enc.yaml
