apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Per-service authentik blueprints live in
# applications/<service>/blueprints/*.yaml. The aggregator script walks the
# tree and emits a single ConfigMap that authentik's worker mounts at
# /blueprints/custom.
generators:
  - blueprints-generator.yaml

# `resources:` stays empty for now — the Helm-chart deployment of authentik
# is still owned by terragrunt/platform/authentik. Once that migrates to
# Argo, drop the chart Application + values here.
