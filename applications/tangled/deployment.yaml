apiVersion: apps/v1
kind: Deployment
metadata:
  name: tangled
  namespace: tangled
  labels:
    app.kubernetes.io/name: tangled-knot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tangled-knot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tangled-knot
    spec:
      containers:
        - name: knot
          image: ghcr.io/dvjn/tangled-knot:v1.14.0-alpha
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5555
            - name: ssh
              containerPort: 22
          env:
            - name: KNOT_SERVER_HOSTNAME
              value: knot.tibor.sh
            - name: KNOT_SERVER_OWNER
              value: did:web:id.tibor.sh
            - name: APPVIEW_ENDPOINT
              value: https://tangled.org
            - name: KNOT_REPO_SCAN_PATH
              value: /home/git/repositories
            - name: KNOT_SERVER_DB_PATH
              value: /app/knotserver.db
            - name: KNOT_SERVER_LISTEN_ADDR
              value: :5555
            - name: KNOT_SERVER_INTERNAL_LISTEN_ADDR
              value: localhost:5444
          volumeMounts:
            - name: sshkeys
              mountPath: /etc/ssh/keys
            - name: repos
              mountPath: /home/git/repositories
            - name: app
              mountPath: /app
          readinessProbe:
            tcpSocket:
              port: 5555
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5555
            initialDelaySeconds: 30
            periodSeconds: 30
        - name: did-web
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: did-http
              containerPort: 80
          volumeMounts:
            - name: did-doc
              mountPath: /usr/share/nginx/html/.well-known/did.json
              subPath: did.json
              readOnly: true
          readinessProbe:
            httpGet:
              path: /.well-known/did.json
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: sshkeys
          persistentVolumeClaim:
            claimName: tangled-sshkeys
        - name: repos
          persistentVolumeClaim:
            claimName: tangled-repos
        - name: app
          persistentVolumeClaim:
            claimName: tangled-app
        - name: did-doc
          configMap:
            name: tangled-did-web
