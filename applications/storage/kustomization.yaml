apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Tier: storage (sync-wave 1). rook is an app-of-apps (parent Application in
# rook/argo-app.yaml ordering its own operator -> cluster -> csi); longhorn
# bundles its Application in its own kustomization.
resources:
  - rook/argo-app.yaml
  - longhorn
