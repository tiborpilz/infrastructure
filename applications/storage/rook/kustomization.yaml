apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Rendered by the parent `rook` Application (app-of-apps). argo-app.yaml (the
# parent) is deliberately NOT listed here: it points its source at this path, so
# including it would be self-referential. Same convention as applications/tekton.
#
# No `namespace:` transformer on purpose: it would relocate the child Application
# CRs out of argocd. The children pin themselves to argocd; namespace.yaml
# declares rook-ceph for the workloads.

resources:
  - namespace.yaml
  - rook-ceph-operator.yaml
  - rook-ceph-csi-drivers.yaml
  - rook-ceph-cluster.yaml
  # Dashboard exposed at ceph.tibor.sh with Ceph's own local login. SSO is parked:
  # native SAML needs end-to-end HTTPS behind the gateway (Ceph wontfix on
  # X-Forwarded-Proto). The SAML blueprint + setup Job live in _parked/ — see
  # _parked/README.md to resume.
  - httproute.yaml
