apiVersion: v1
kind: Namespace
metadata:
  name: rook-ceph
  labels:
    managed-by: argo
    # Pod Security Admission reads these as LABELS, not annotations. Rook's
    # mon/osd/mgr pods mount hostPath and run privileged; without these the
    # namespace falls back to the cluster default (baseline) and mon pods are
    # rejected ("violates PodSecurity baseline: hostPath volumes").
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
  annotations:
    # Create the namespace before the child Applications that target it.
    argocd.argoproj.io/sync-wave: "-1"
