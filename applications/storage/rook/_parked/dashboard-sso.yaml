---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rook-dashboard-sso
  namespace: rook-ceph
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rook-dashboard-sso
  namespace: rook-ceph
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rook-dashboard-sso
  namespace: rook-ceph
subjects:
  - kind: ServiceAccount
    name: rook-dashboard-sso
    namespace: rook-ceph
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rook-dashboard-sso
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rook-dashboard-sso
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: rook-dashboard-sso
      containers:
        - name: configure
          image: alpine/k8s:1.36.2
          env:
            - name: BASE_URL
              value: https://ceph.tibor.sh
            - name: IDP_METADATA
              value: https://auth.tibor.sh/application/saml/ceph/metadata/
            - name: USERNAME_ATTR
              value: http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress
            - name: ADMIN_EMAIL
              value: tibor@pilz.berlin
          command: ["/bin/sh", "-eu", "-c"]
          args:
            - |
              # Wait for the SAML metadata so this Job is decoupled from blueprint sync timing.
              echo "Waiting for IdP metadata at $IDP_METADATA ..."
              i=0
              until curl -fsS -o /dev/null --max-time 10 "$IDP_METADATA"; do
                i=$((i+1))
                if [ "$i" -ge 30 ]; then
                  echo "IdP metadata still unavailable after $i tries; is the ceph SAML app created in authentik?" >&2
                  exit 1
                fi
                echo "  metadata not ready (attempt $i); sleeping 10s"
                sleep 10
              done
              echo "IdP metadata available."
              TOOLS=$(kubectl -n rook-ceph get pod -l app=rook-ceph-tools \
                -o jsonpath='{.items[0].metadata.name}')
              if [ -z "$TOOLS" ]; then echo "rook-ceph-tools pod not found" >&2; exit 1; fi
              echo "Configuring Ceph dashboard SAML SSO via $TOOLS"
              kubectl -n rook-ceph exec -i "$TOOLS" -- sh -s <<EOF
              set -eu
              ceph dashboard sso setup saml2 "$BASE_URL" "$IDP_METADATA" "$USERNAME_ATTR"
              if ! ceph dashboard ac-user-show "$ADMIN_EMAIL" >/dev/null 2>&1; then
                echo "creating dashboard admin user $ADMIN_EMAIL"
                head -c 18 /dev/urandom | base64 > /tmp/ceph-sso-pw
                ceph dashboard ac-user-create "$ADMIN_EMAIL" -i /tmp/ceph-sso-pw administrator
                rm -f /tmp/ceph-sso-pw
              else
                echo "dashboard user $ADMIN_EMAIL already exists"
              fi
              # Enable only after the admin user exists, else SSO locks out with no valid login.
              ceph dashboard sso enable saml2
              ceph dashboard sso status
              EOF
              echo "Ceph dashboard SSO configured."
