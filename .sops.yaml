keys:
  - &argocd age1nhsx40cf26syk9jt8hkd0grdrc9qc45sk52cl5vy0d78fxl2f4hs4h7laa
  - &cluster age1eagn023gem8ekv6q8gx7rc37x2rsxfscpyt2znd4j5l8ryehksdqzjek59
creation_rules:
  # Terragrunt secrets are consumed locally, never by the cluster: encrypt
  # every value (no encrypted_regex) and only to the user's PGP key so the
  # in-cluster keys can't read terraform state material.
  - path_regex: terragrunt/.*\.enc\.yaml$
    key_groups:
      - pgp:
          - 03746612698994281D322B09923BC5E9B4E9509B
  - path_regex: \.enc\.yaml$
    # Keep apiVersion/kind/metadata/spec scaffolding plaintext so the
    # SopsSecret operator and kubectl can parse the manifest; encrypt only
    # the actual secret values.
    encrypted_regex: ^(data|stringData)$
    key_groups:
      - age:
          - *argocd
          - *cluster
        pgp:
          - 03746612698994281D322B09923BC5E9B4E9509B
