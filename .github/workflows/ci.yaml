name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  renovate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate renovate.json
        run: npx --yes --package renovate@42 -- renovate-config-validator --strict

  manifests:
    runs-on: ubuntu-latest
    env:
      KUSTOMIZE_VERSION: v5.7.1
      KUBECONFORM_VERSION: v0.7.0
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kustomize

      - name: Install kubeconform
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kubeconform

      - name: Render and validate manifests
        run: ./.github/scripts/validate-manifests.sh applications
